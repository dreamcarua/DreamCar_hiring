<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Анкета кандидата — Операційний директор DreamCar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0A0A0A;
    --bg2:       #141414;
    --bg3:       #1C1C1C;
    --red:       #E3000F;
    --red-dim:   #B8000C;
    --red-bg:    rgba(227,0,15,0.08);
    --red-bg2:   rgba(227,0,15,0.15);
    --white:     #FFFFFF;
    --muted:     #888888;
    --border:    #252525;
    --border2:   #303030;
    --success:   #22C55E;
    --radius:    12px;
    --shadow:    0 4px 24px rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
  }

  .hero {
    background: linear-gradient(160deg, #0A0A0A 0%, #1A0000 60%, #0A0A0A 100%);
    border-bottom: 1px solid var(--border);
    padding: 52px 24px 44px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute;
    top: -80px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(227,0,15,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-logo {
    font-family: 'Oswald', sans-serif;
    font-size: 32px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 20px; position: relative; z-index: 1;
  }
  .hero-logo span { color: var(--red); }
  .hero-badge {
    display: inline-block;
    background: var(--red-bg2);
    border: 1px solid rgba(227,0,15,0.35);
    color: var(--red);
    font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    padding: 5px 16px; border-radius: 20px; margin-bottom: 18px;
    position: relative; z-index: 1;
  }
  .hero h1 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(24px, 4vw, 38px); font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
    color: var(--white); margin-bottom: 10px; position: relative; z-index: 1;
  }
  .hero p {
    color: var(--muted); font-size: 14px; max-width: 480px;
    margin: 0 auto 28px; line-height: 1.7; position: relative; z-index: 1;
  }
  .progress-wrap {
    max-width: 380px; margin: 0 auto 10px;
    background: rgba(255,255,255,0.06);
    border-radius: 20px; height: 4px; overflow: hidden; position: relative; z-index: 1;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--red-dim), var(--red));
    border-radius: 20px; width: 0%; transition: width 0.4s ease;
  }
  .progress-label { color: var(--muted); font-size: 13px; position: relative; z-index: 1; }
  .progress-label span { color: var(--red); font-weight: 700; }

  .container { max-width: 800px; margin: 0 auto; padding: 40px 20px 100px; }

  .info-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-left: 3px solid var(--red); border-radius: var(--radius);
    padding: 18px 22px; margin-bottom: 32px;
  }
  .info-card p { color: var(--muted); font-size: 14px; line-height: 1.7; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 40px; }
  @media (max-width: 540px) { .info-grid { grid-template-columns: 1fr; } }

  .field label {
    display: block; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px;
  }
  .field input {
    width: 100%; padding: 10px 14px;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 8px; color: var(--white);
    font-family: inherit; font-size: 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(227,0,15,0.12); }
  .field input::placeholder { color: #3A3A3A; }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, var(--red-dim), transparent);
    margin: 8px 0 36px; opacity: 0.35;
  }

  .block { margin-bottom: 44px; }
  .block-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 20px; padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .block-num {
    width: 38px; height: 38px; flex-shrink: 0;
    background: var(--red-bg2); border: 1px solid rgba(227,0,15,0.35);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; color: var(--red);
  }
  .block-title {
    font-family: 'Oswald', sans-serif;
    font-size: 15px; font-weight: 600; color: var(--white); text-transform: uppercase; letter-spacing: 1px;
  }
  .block-desc { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .q-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 14px;
    box-shadow: var(--shadow); transition: border-color 0.25s; overflow: hidden;
  }
  .q-card:focus-within { border-color: rgba(227,0,15,0.5); }
  .q-card.answered { border-color: var(--success); }

  .q-header {
    background: var(--bg3); padding: 14px 18px;
    display: flex; align-items: flex-start; gap: 12px;
    transition: background 0.2s;
  }
  .q-card.answered .q-header { background: rgba(34,197,94,0.06); }

  .q-num {
    font-size: 12px; font-weight: 700; color: var(--red);
    background: var(--red-bg); border: 1px solid rgba(227,0,15,0.2);
    padding: 2px 10px; border-radius: 20px; flex-shrink: 0; margin-top: 2px; white-space: nowrap;
    transition: all 0.2s;
  }
  .q-card.answered .q-num {
    color: var(--success); background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.25);
  }
  .q-text { font-size: 15px; font-weight: 600; color: var(--white); line-height: 1.5; flex: 1; }
  .q-check {
    width: 22px; height: 22px; flex-shrink: 0; margin-top: 1px;
    background: var(--success); border-radius: 50%;
    display: none; align-items: center; justify-content: center;
    font-size: 11px; color: #000; font-weight: 800;
  }
  .q-card.answered .q-check { display: flex; }

  .q-hint {
    padding: 10px 18px 12px; font-size: 13px; color: var(--muted);
    font-style: italic; line-height: 1.6; border-bottom: 1px solid var(--border);
  }
  .q-body { padding: 14px 18px 18px; }

  textarea {
    width: 100%; min-height: 110px;
    background: var(--bg); border: 1px solid var(--border2);
    border-radius: 8px; padding: 12px 14px;
    font-family: inherit; font-size: 14px; color: var(--white);
    line-height: 1.6; resize: vertical; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea:focus { border-color: rgba(227,0,15,0.5); box-shadow: 0 0 0 3px rgba(227,0,15,0.08); }
  textarea::placeholder { color: #303030; }

  .char-count { text-align: right; font-size: 12px; color: #3A3A3A; margin-top: 5px; transition: color 0.2s; }
  .char-count.ok { color: var(--success); }
  .char-count.typing { color: var(--muted); }
  .char-count.need { color: #E87A4B; }

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.97); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border); padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px; z-index: 100;
  }
  .save-label { font-size: 13px; color: var(--muted); }
  .save-label b { color: var(--white); }
  .btns { display: flex; gap: 10px; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 700; cursor: pointer;
    border: none; outline: none; transition: all 0.2s; white-space: nowrap; font-family: inherit;
  }
  .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--muted); color: var(--white); }
  .btn-send { background: var(--red); color: var(--white); font-family: 'Oswald', sans-serif; letter-spacing: 0.5px; font-size: 14px; }
  .btn-send:hover { background: #FF1020; transform: translateY(-1px); box-shadow: 0 4px 18px rgba(227,0,15,0.4); }

  .toast {
    position: fixed; bottom: 72px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--bg3); border: 1px solid var(--border2); color: var(--white);
    padding: 11px 22px; border-radius: 30px; font-size: 14px;
    opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 200; box-shadow: var(--shadow);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 580px) {
    .bottom-bar { flex-direction: column; align-items: stretch; }
    .btns { justify-content: stretch; }
    .btns .btn { flex: 1; justify-content: center; }
  }
  @media print { .bottom-bar { display: none; } body { background: white; color: black; } }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-logo">Dream<span>Car</span></div>
  <div class="hero-badge">Анкета кандидата</div>
  <h1>Операційний директор</h1>
  <p>Заповніть у зручному темпі — відповіді зберігаються автоматично.</p>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="progress-label">Заповнено: <span id="progressText">0 з 16</span></div>
</div>

<div class="container">
  <div class="info-card">
    <p>Ці поля необов'язкові, але допоможуть нам зорієнтуватися перед зустріччю.</p>
  </div>
  <div class="info-grid">
    <div class="field"><label>Ім'я та прізвище</label><input type="text" id="f_name" placeholder="Іван Петренко"></div>
    <div class="field"><label>LinkedIn / резюме</label><input type="text" id="f_link" placeholder="linkedin.com/in/..."></div>
    <div class="field"><label>Email</label><input type="email" id="f_email" placeholder="ivan@email.com"></div>
    <div class="field"><label>Телефон</label><input type="tel" id="f_phone" placeholder="+380 XX XXX XX XX"></div>
  </div>
  <div class="divider"></div>
  <div id="qContainer"></div>
</div>

<div class="bottom-bar">
  <div class="save-label">Збережено: <b id="saveTime">щойно</b></div>
  <div class="btns">
    <button class="btn btn-ghost" onclick="window.print()">🖨 Друк</button>
    <button class="btn btn-ghost" onclick="clearForm()">🗑 Очистити</button>
    <button class="btn btn-send" onclick="sendForm()">✉️ Надіслати відповіді</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const BLOCKS = [
  { num:1, title:"Досвід і кейси", desc:"Ваш попередній досвід", questions:[
    { id:"q1", title:"Bardahl — маркетинг і результати", hint:"Яка була логіка пошуку блогерів і рекламних каналів? Критерії відбору. За рахунок яких конкретних дій підняли продажі? Що впроваджували з нуля.", ph:"Опишіть підхід і конкретні результати..." },
    { id:"q2", title:"Операційні кризи", hint:"Найбільший «факап» на попередній роботі. Як діяли. Що б зробили інакше.", ph:"Конкретна ситуація і ваші дії..." },
    { id:"q3", title:"Побудова процесів з нуля", hint:"Приклад: прийшли — нічого нема. З чого почали, як розставляли пріоритети.", ph:"Конкретний кейс з досвіду..." },
  ]},
  { num:2, title:"Запуск і операційка DreamCar", desc:"Організація запусків", questions:[
    { id:"q4", title:"Алгоритм запуску", hint:"Запускаємо проєкт за тиждень. Покроково: від вибору авто до передачі ключів. Хто за що відповідає.", ph:"Покроковий план дій..." },
    { id:"q5", title:"Технічна і платіжна надійність", hint:"Облік учасників, пік трафіку, блокування платежів, фінальне вивантаження списків — як не допустити збоїв.", ph:"Підхід до технічної надійності..." },
    { id:"q6", title:"Сценарій фінансового провалу", hint:"За 3 дні до фіналу зібрана сума не покриває вартість авто. Ваші конкретні кроки.", ph:"Антикризовий план..." },
    { id:"q7", title:"Метрики і аналітика", hint:"KPI по кожному запуску. Що в реальному часі, що постфактум. Якими інструментами.", ph:"Ключові метрики, інструменти, підхід..." },
  ]},
  { num:3, title:"Довіра і аудиторія", desc:"Залучення та утримання", questions:[
    { id:"q8", title:"Прозорість і боротьба зі скептицизмом", hint:"Конкретні механіки довіри — не загальні слова. Як переконати людину що це не обман.", ph:"Конкретні механіки і кроки..." },
    { id:"q9", title:"Утримання аудиторії між запусками", hint:"Telegram, Instagram — як не дати відписатися і тримати інтерес до наступного авто.", ph:"Стратегія утримання і контент..." },
    { id:"q10", title:"Залучення нової аудиторії", hint:"Канали і дії для зростання бази. Що б протестували в першу чергу.", ph:"Канали, гіпотези, пріоритети..." },
  ]},
  { num:4, title:"Системність і масштаб", desc:"Процеси і команда", questions:[
    { id:"q11", title:"Регулярність запусків", hint:"Ціль: 1+ запуск на місяць. Що побудувати, щоб це стало конвеєром а не подвигом.", ph:"Що стандартизувати, автоматизувати, делегувати..." },
    { id:"q12", title:"Управління підрядниками і командою", hint:"Як контролювати результат без мікроменеджменту. Як не губити людей між запусками.", ph:"Система роботи з підрядниками..." },
    { id:"q13", title:"Юридична і фінансова свідомість", hint:"Приклад коли операційне рішення мало юридичні або фінансові наслідки. Як вирішували.", ph:"Конкретний приклад і дії..." },
  ]},
  { num:5, title:"Мотивація і fit", desc:"Чому DreamCar", questions:[
    { id:"q14", title:"Що не вистачає проєкту", hint:"Чесна оцінка слабких місць або зон ризику DreamCar. Що б змінили в першу чергу.", ph:"Чесний погляд на зони росту..." },
    { id:"q15", title:"Очікування і мотивація", hint:"Чому цей проєкт? Що приваблює і що може розчарувати. Яких умов і повноважень потрібно.", ph:"Мотивація і очікування..." },
    { id:"q16", title:"Стиль роботи під тиском", hint:"Як виглядає робочий тиждень коли все горить. Як розставляєте пріоритети.", ph:"Підхід до роботи під тиском..." },
  ]},
];

const allQ = BLOCKS.flatMap(b => b.questions);

// BUILD DOM
const container = document.getElementById('qContainer');
let n = 1;
BLOCKS.forEach((block, bi) => {
  const bEl = document.createElement('div');
  bEl.className = 'block';
  bEl.innerHTML = `<div class="block-header"><div class="block-num">${block.num}</div><div><div class="block-title">${block.title}</div><div class="block-desc">${block.desc}</div></div></div>`;
  block.questions.forEach(q => {
    const num = n++;
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'card_' + q.id;
    card.innerHTML =
      `<div class="q-header"><span class="q-num">${num}</span><span class="q-text">${q.title}</span><span class="q-check">✓</span></div>` +
      `<div class="q-hint">💡 ${q.hint}</div>` +
      `<div class="q-body"><textarea id="${q.id}" placeholder="${q.ph}" rows="5"></textarea><div class="char-count" id="cc_${q.id}">0 символів</div></div>`;
    bEl.appendChild(card);
  });
  container.appendChild(bEl);
  if (bi < BLOCKS.length - 1) { const d = document.createElement('div'); d.className = 'divider'; container.appendChild(d); }
});

// ATTACH EVENTS — after DOM is built
allQ.forEach(q => {
  const ta = document.getElementById(q.id);
  if (ta) ta.addEventListener('input', function() { tick(q.id); });
});
['f_name','f_link','f_email','f_phone'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', persist);
});

// TICK — called on every keystroke
function tick(id) {
  const ta   = document.getElementById(id);
  const cc   = document.getElementById('cc_' + id);
  const card = document.getElementById('card_' + id);
  if (!ta || !cc || !card) return;
  const len = ta.value.length;
  const MIN = 30;
  if (len >= MIN) {
    cc.textContent = len + ' символів ✓';
    cc.className = 'char-count ok';
    card.classList.add('answered');
  } else if (len > 0) {
    const left = MIN - len;
    cc.textContent = len + ' символів — ще ' + left + ' для зарахування';
    cc.className = 'char-count need';
    card.classList.remove('answered');
  } else {
    cc.textContent = 'мінімум ' + MIN + ' символів для зарахування';
    cc.className = 'char-count';
    card.classList.remove('answered');
  }
  refreshProgress();
  persist();
}

function refreshProgress() {
  const done = allQ.filter(q => { const t = document.getElementById(q.id); return t && t.value.trim().length >= 30; }).length;
  document.getElementById('progressBar').style.width = Math.round(done / allQ.length * 100) + '%';
  document.getElementById('progressText').textContent = done + ' з ' + allQ.length;
}

// STORAGE
const KEY = 'dc_iv3';
function persist() {
  const d = { fn: document.getElementById('f_name').value, fl: document.getElementById('f_link').value, fe: document.getElementById('f_email').value, fp: document.getElementById('f_phone').value, a: {} };
  allQ.forEach(q => { const t = document.getElementById(q.id); if (t) d.a[q.id] = t.value; });
  try { sessionStorage.setItem(KEY, JSON.stringify(d)); } catch(e) {}
  const now = new Date();
  document.getElementById('saveTime').textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}
function restore() {
  try {
    const raw = sessionStorage.getItem(KEY); if (!raw) return;
    const d = JSON.parse(raw);
    if (d.fn) document.getElementById('f_name').value  = d.fn;
    if (d.fl) document.getElementById('f_link').value  = d.fl;
    if (d.fe) document.getElementById('f_email').value = d.fe;
    if (d.fp) document.getElementById('f_phone').value = d.fp;
    if (d.a) Object.entries(d.a).forEach(([id, val]) => { const t = document.getElementById(id); if (t && val) { t.value = val; tick(id); } });
  } catch(e) {}
}

function clearForm() {
  if (!confirm('Очистити всі відповіді?')) return;
  try { sessionStorage.removeItem(KEY); } catch(e) {}
  ['f_name','f_link','f_email','f_phone'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  allQ.forEach(q => { const t = document.getElementById(q.id); if (t) { t.value = ''; tick(q.id); } });
  toast('Форму очищено');
}

function sendForm() {
  const done = allQ.filter(q => { const t = document.getElementById(q.id); return t && t.value.trim().length >= 30; }).length;
  if (done < 8) { toast('⚠️ Заповніть мінімум 8 питань перед надсиланням'); return; }
  const name = document.getElementById('f_name').value || 'Кандидат';
  let body = `Анкета: ${name}\nEmail: ${document.getElementById('f_email').value}\nТелефон: ${document.getElementById('f_phone').value}\nLinkedIn: ${document.getElementById('f_link').value}\n\n${'='.repeat(50)}\n\n`;
  BLOCKS.forEach((block, bi) => {
    body += `БЛОК ${block.num}: ${block.title.toUpperCase()}\n\n`;
    block.questions.forEach((q, qi) => {
      const num = BLOCKS.slice(0,bi).reduce((a,b)=>a+b.questions.length,0)+qi+1;
      const t = document.getElementById(q.id);
      const ans = (t && t.value.trim()) ? t.value.trim() : '(не заповнено)';
      body += `${num}. ${q.title}\nПитання: ${q.hint}\nВідповідь: ${ans}\n\n`;
    });
  });
  window.location.href = `mailto:vg@dreamcar.ua?subject=${encodeURIComponent('Анкета кандидата ОД DreamCar — ' + name)}&body=${encodeURIComponent(body)}`;
  toast('✅ Відкривається поштовий клієнт...');
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}

restore();
refreshProgress();
</script>
